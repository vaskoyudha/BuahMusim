<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Green circle background -->
  <circle cx="16" cy="16" r="16" fill="#16a34a"/>
  <!-- Mango body: teardrop/oval shape -->
  <ellipse cx="16" cy="17" rx="7" ry="9" fill="white" transform="rotate(-15 16 17)"/>
  <!-- Mango highlight -->
  <ellipse cx="13.5" cy="13" rx="2.5" ry="3.5" fill="#dcfce7" opacity="0.6" transform="rotate(-15 13.5 13)"/>
  <!-- Stem -->
  <line x1="16" y1="8" x2="17" y2="5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Leaf -->
  <ellipse cx="19" cy="4.5" rx="3" ry="1.2" fill="#86efac" transform="rotate(-30 19 4.5)"/>
</svg>
