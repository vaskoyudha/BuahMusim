version: '3.8'
services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3001:3000"
    environment:
      - DATABASE_PATH=/app/data/buahmusim.db
      - ML_SERVICE_URL=http://ml-service:8000
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    volumes:
      - buahmusim-data:/app/data
    depends_on:
      - ml-service

  ml-service:
    build:
      context: apps/ml-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"

volumes:
  buahmusim-data:
